<!DOCTYPE html>
<html>

<head>
    <title>MANIFEST TRANSPORT CAR TRACKER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h1 class="text-success">
            MANIFEST TRANSPORT CAR TRACKER
        </h1>

        <h4 class="text-warning">
            {{ event.name }}
        </h4>

        <hr>

        <!-- Main Grid Row -->
        <div class="row g-4">

            <!-- 1. BUS CARD -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h3>BUS</h3>
                        <h1>{{ buses.count|default:0 }}</h1>
                        <a href="/add-bus/" class="btn btn-success">+1 ADD BUS</a>
                        <a href="/subtract-bus/" onclick="return confirm('Are you sure?')" class="btn btn-danger">-1</a>
                    </div>
                </div>
            </div>

            <!-- 2. COSTER CARD -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h3>COSTER</h3>
                        <h1>{{ costers.count|default:0 }}</h1>
                        <a href="/add-coster/" class="btn btn-success">+1 ADD COSTER</a>
                        <a href="/subtract-coster/" onclick="return confirm('Are you sure?')" class="btn btn-danger">-1</a>
                    </div>
                </div>
            </div>

            <!-- 3. TAXI CARD -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h3>TAXI</h3>
                        <h1>{{ taxis.count|default:0 }}</h1>
                        <a href="/add-taxi/" class="btn btn-success">+1 ADD TAXI</a>
                        <a href="/subtract-taxi/" onclick="return confirm('Are you sure?')" class="btn btn-danger">-1</a>
                    </div>
                </div>
            </div>

        </div> <!-- End Row -->

    </div>

</body>

</html>
